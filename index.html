        db.lastSaved = brNow();
        db.updatedAtMs = Date.now();
        if(typeof KEY !== "undefined") localStorage.setItem(KEY, JSON.stringify(db));
      }
    }catch(e){}

    localStorage.setItem(LOCAL_KEY, JSON.stringify({tasks, updatedAtMs:Date.now(), lastSaved:brNow()}));

    try{ if(typeof save === "function") save(false); }catch(e){}
    try{ if(typeof salvarAlteracoes === "function") salvarAlteracoes(); }catch(e){}
    try{ if(typeof saveData === "function") saveData(); }catch(e){}
    try{ if(typeof autoSave === "function") autoSave(); }catch(e){}

    try{
      if(typeof cloudReady !== "undefined" && cloudReady && typeof cloudRef !== "undefined" && cloudRef){
        if(typeof setDoc === "function") await setDoc(cloudRef, (typeof db !== "undefined" ? db : {tasks}), {merge:true});
        else if(cloudRef.set) await cloudRef.set((typeof db !== "undefined" ? db : {tasks}), {merge:true});
      }
    }catch(e){}
  }

  function sortTasks(a,b){
    return (Number(a.done)-Number(b.done)) ||
      String(a.date||"9999-99-99").localeCompare(String(b.date||"9999-99-99")) ||
      String(a.start||"").localeCompare(String(b.start||""));
  }

  function isTasksTab(){
    const activeBtn = Array.from(document.querySelectorAll("button,.tab,a")).find(el=>{
      const t=(el.innerText||"").toLowerCase();
      const cls=(el.className||"").toString().toLowerCase();
      return t.includes("tarefa") && (cls.includes("active") || el.getAttribute("aria-selected")==="true");
    });
    if(activeBtn) return true;
    const sec = document.getElementById("tarefas");
    if(sec){
      const st = getComputedStyle(sec);
      if(st.display !== "none" && st.visibility !== "hidden") return true;
    }
    return (document.body.innerText||"").toLowerCase().includes("registrar tarefa");
  }

  function ensurePanel(){
    let panel = document.getElementById("taskFixedPanel");
    if(!panel){
      panel = document.createElement("div");
      panel.id = "taskFixedPanel";
      panel.className = "card";
      const sec = document.getElementById("tarefas");
      if(sec) sec.parentNode.insertBefore(panel, sec);
      else (document.querySelector("main")||document.body).appendChild(panel);
    }
    return panel;
  }

  function renderFixed(){
    const panel = ensurePanel();
    if(!isTasksTab()) {
      panel.classList.remove("active");
      return;
    }
    panel.classList.add("active");

    // não redesenha se estiver digitando dentro do painel
    const active = document.activeElement;
    if(active && active.closest && active.closest("#taskFixedPanel")) return;

    purgeDeletedEverywhere();
    const tasks = getAllTasks().sort(sortTasks);
    panel.innerHTML = `
      <h2>Tarefas</h2>
      <p class="muted">Formulário fixo: não some enquanto você preenche.</p>
      <input id="tfixedId" type="hidden">
      <div class="task-fixed-grid">
        <input id="tfixedTitle" placeholder="Tarefa">
        <input id="tfixedDate" type="date" value="${hoje()}">
        <input id="tfixedStart" type="time">
        <input id="tfixedEnd" type="time">
        <select id="tfixedPriority"><option>Alta</option><option selected>Média</option><option>Baixa</option></select>
        <input id="tfixedObs" placeholder="Observação">
      </div>
      <button class="primary" type="button" id="tfixedSave">Registrar tarefa</button>
      <button type="button" id="tfixedClear">Limpar</button>
      <button type="button" id="tfixedSync">Forçar sincronização</button>

      <h3 style="margin-top:18px">Lista de tarefas</h3>
      <div class="task-fixed-list">
        ${tasks.length ? tasks.map(t=>`
          <div class="task-fixed-item">
            <label style="display:flex;gap:8px;align-items:center">
              <input type="checkbox" data-fixed-done="${t.id}" ${t.done ? "checked" : ""}>
              <strong>${t.done ? "✅" : "⬜"} ${t.title||""}</strong>
            </label>
            <small>${t.date||""} ${t.start ? "• "+t.start : ""}${t.end ? " até "+t.end : ""} • ${t.priority||"Média"}</small>
            ${t.obs ? `<p class="muted">${t.obs}</p>` : ""}
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
              <button type="button" data-fixed-edit="${t.id}">Editar</button>
              <button type="button" data-fixed-del="${t.id}">Excluir</button>
            </div>
          </div>
        `).join("") : "<p class='muted'>Nenhuma tarefa cadastrada.</p>"}
      </div>
    `;

    // Esconde área original só na aba tarefas para evitar duplicação/sumiço
    const sec = document.getElementById("tarefas");
    if(sec) sec.style.display = "none";

    panel.querySelector("#tfixedSave").onclick = async function(){
      const title = document.getElementById("tfixedTitle").value.trim();
      if(!title){ alert("Digite o nome da tarefa."); return; }
      const id = document.getElementById("tfixedId").value;
      const tasks = getAllTasks();
      const data = {
        title,
        date:document.getElementById("tfixedDate").value || hoje(),
        start:document.getElementById("tfixedStart").value || "",
        end:document.getElementById("tfixedEnd").value || "",
        priority:document.getElementById("tfixedPriority").value || "Média",
        obs:document.getElementById("tfixedObs").value || ""
      };
      if(id){
        const t=tasks.find(x=>x.id===id);
        if(t) Object.assign(t,data);
      }else{
        tasks.push(Object.assign({id:uid(),done:false},data));
      }
      await saveTasks(tasks);
      renderFixed();
      try{ if(typeof renderHome==="function") renderHome(); }catch(e){}
    };

    panel.querySelector("#tfixedClear").onclick = function(){ renderFixed(); };
    panel.querySelector("#tfixedSync").onclick = async function(){ await saveTasks(getAllTasks()); alert("Sincronização enviada. Atualize o outro aparelho."); };

    panel.querySelectorAll("[data-fixed-done]").forEach(chk=>{
      chk.onchange = async function(){
        const tasks = getAllTasks();
        const t=tasks.find(x=>x.id===chk.getAttribute("data-fixed-done"));
        if(t) t.done = chk.checked;
        await saveTasks(tasks);
        renderFixed();
      };
    });

    panel.querySelectorAll("[data-fixed-del]").forEach(btn=>{
      btn.onclick = async function(){
        if(!confirm("Excluir esta tarefa?")) return;
        const id=btn.getAttribute("data-fixed-del");
        markTaskDeleted(id);
        await saveTasks(getAllTasks().filter(t=>t.id!==id));
        renderFixed();
      };
    });

    panel.querySelectorAll("[data-fixed-edit]").forEach(btn=>{
      btn.onclick = function(){
        const t=getAllTasks().find(x=>x.id===btn.getAttribute("data-fixed-edit"));
        if(!t) return;
        document.getElementById("tfixedId").value=t.id||"";
        document.getElementById("tfixedTitle").value=t.title||"";
        document.getElementById("tfixedDate").value=t.date||hoje();
        document.getElementById("tfixedStart").value=t.start||"";
        document.getElementById("tfixedEnd").value=t.end||"";
        document.getElementById("tfixedPriority").value=t.priority||"Média";
        document.getElementById("tfixedObs").value=t.obs||"";
        document.getElementById("tfixedTitle").focus();
      };
    });
  }

  window.renderTaskFixedPanel = renderFixed;

  document.addEventListener("click", function(e){
    setTimeout(renderFixed, 250);
  }, false);

  window.addEventListener("focus", function(){ setTimeout(renderFixed, 300); });
  setTimeout(renderFixed, 1000);
})();
</script>


<script>
/* Correção direta dos eventos da aba tarefas + contadores.
   Não reestrutura HTML; mantém checkbox e botões originais funcionando. */
(function(){
  if(window.__tarefasEventosCorrigidosFinal) return;
  window.__tarefasEventosCorrigidosFinal = true;

  function getTasksSafe(){
    try{
      if(typeof getAllTasks === "function") return getAllTasks();
    }catch(e){}
    try{
      if(typeof db !== "undefined" && Array.isArray(db.tasks)) return db.tasks;
    }catch(e){}
    return [];
  }

  async function saveTasksSafe(tasks){
    try{
      if(typeof saveTasks === "function"){
        await saveTasks(tasks);
        return;
      }
    }catch(e){ console.warn(e); }

    try{
      if(typeof db !== "undefined"){
        db.tasks = tasks;
        db.lastSaved = new Date().toLocaleString("pt-BR");
        db.updatedAtMs = Date.now();
        if(typeof KEY !== "undefined") localStorage.setItem(KEY, JSON.stringify(db));
      }
    }catch(e){}

    try{ if(typeof save === "function") save(false); }catch(e){}
    try{ if(typeof salvarAlteracoes === "function") salvarAlteracoes(); }catch(e){}
    try{ if(typeof saveData === "function") saveData(); }catch(e){}
    try{ if(typeof autoSave === "function") autoSave(); }catch(e){}
  }

  function renderTasksPanelSafe(){
    try{
      if(typeof renderTaskFixedPanel === "function"){
        renderTaskFixedPanel();
        setTimeout(addCounters, 80);
      }
    }catch(e){}
  }

  function addCounters(){
    const panel = document.getElementById("taskFixedPanel");
    if(!panel || !panel.classList.contains("active")) return;

    const items = Array.from(panel.querySelectorAll(".task-fixed-item"));
    if(!items.length) return;

    let done = 0;
    items.forEach(item=>{
      const chk = item.querySelector('input[type="checkbox"]');
      const isDone = !!(chk && chk.checked);
      if(isDone) done++;
      item.classList.toggle("task-done-safe", isDone);
    });

    const total = items.length;
    const pend = total - done;

    let counter = panel.querySelector(".task-counter-wrap");
    if(!counter){
      counter = document.createElement("div");
      counter.className = "task-counter-wrap";
      const h3 = Array.from(panel.querySelectorAll("h3")).find(x => (x.innerText||"").toLowerCase().includes("lista"));
      if(h3) h3.insertAdjacentElement("afterend", counter);
      else {
        const list = panel.querySelector(".task-fixed-list");
        if(list) list.insertAdjacentElement("beforebegin", counter);
      }
    }

    counter.innerHTML =
      '<div class="task-counter-card">📋 Total<strong>'+total+'</strong></div>' +
      '<div class="task-counter-card">⏳ Pendentes<strong>'+pend+'</strong></div>' +
      '<div class="task-counter-card">✅ Concluídas<strong>'+done+'</strong></div>';
  }

  function taskIdFrom(el, attr){
    if(!el) return "";
    return el.getAttribute(attr) || "";
  }

  async function handleDelete(btn){
    const id = taskIdFrom(btn, "data-fixed-del");
    if(!id) return;
    if(!confirm("Excluir esta tarefa?")) return;

    const tasks = getTasksSafe().filter(t => t.id !== id);
    await saveTasksSafe(tasks);
    renderTasksPanelSafe();
  }

  async function handleDone(chk){
    const id = taskIdFrom(chk, "data-fixed-done");
    if(!id) return;

    const tasks = getTasksSafe();
    const t = tasks.find(x => x.id === id);
    if(t) t.done = !!chk.checked;

    await saveTasksSafe(tasks);
    renderTasksPanelSafe();
  }

  // Captura cliques nos botões de excluir antes de qualquer outro script atrapalhar.
  document.addEventListener("click", function(e){
    const del = e.target && e.target.closest && e.target.closest("[data-fixed-del]");
    if(del){
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      handleDelete(del);
      return false;
    }

    const panel = document.getElementById("taskFixedPanel");
    if(panel && panel.contains(e.target)){
      setTimeout(addCounters, 80);
    }
  }, true);

  // Checkbox: deixa o clique marcar normalmente e salva logo depois.
  document.addEventListener("change", function(e){
    const chk = e.target && e.target.matches && e.target.matches("[data-fixed-done]");
    if(chk){
      e.stopPropagation();
      e.stopImmediatePropagation();
      handleDone(e.target);
      return false;
    }
  }, true);

  // Segurança extra no touch/celular
  document.addEventListener("touchend", function(e){
    const del = e.target && e.target.closest && e.target.closest("[data-fixed-del]");
    if(del){
      e.preventDefault();
      e.stopPropagation();
      handleDelete(del);
      return false;
    }
  }, true);

  const oldRender = window.renderTaskFixedPanel;
  if(typeof oldRender === "function"){
    window.renderTaskFixedPanel = function(){
      const r = oldRender.apply(this, arguments);
      setTimeout(addCounters, 80);
      return r;
    };
  }

  setTimeout(addCounters, 1000);
})();
</script>








<script>
/* IA ÚNICA DIRETA FINAL — sem Netlify Functions e sem chamadas antigas */
(function(){
  if(window.__iaUnicaDiretaFinalOK) return;
  window.__iaUnicaDiretaFinalOK = true;

  const OPENAI_KEY_STORAGE = "openai_api_key_daniel_health_os";

  function n(v){
    const x = parseFloat(String(v || "").replace(",", "."));
    return Number.isFinite(x) ? x : 0;
  }

  function getKey(){
    return localStorage.getItem(OPENAI_KEY_STORAGE) || "";
  }

  function saveKey(v){
    if(v && v.trim()) localStorage.setItem(OPENAI_KEY_STORAGE, v.trim());
  }

  function todayIA(){
    try { return today(); } catch(e) {
      const d = new Date();
      return new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10);
    }
  }

  function escapeHtml(s){
    return String(s || "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
  }

  function foodSection(){
    return document.getElementById("alimentacao") ||
           document.getElementById("food") ||
           document.querySelector("#alimentacao, .alimentacao") ||
           null;
  }

  function removeOldIABoxes(){
    [
      "iaPratoBoxClean","iaBackendBox","iaFinalBox","iaUnificadaBox",
      "iaEstaticaBox","iaPratoRebuildBox","iaPratoBox","iaPratoBoxClean",
      "iaBackendResult","iaStaticResult","iaUniResult","iaFinalResult"
    ].forEach(id => {
      const el = document.getElementById(id);
      if(el && id !== "iaDiretaFinalBox") {
        const card = el.closest && el.closest(".card");
        if(card && card.id !== "iaDiretaFinalBox") card.remove();
        else el.remove();
      }
    });
  }

  function compress(file, maxSize, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      const img = new Image();
      reader.onload = e => {
        img.onload = () => {
          let w = img.width, h = img.height;
          if(w > h && w > maxSize){ h = Math.round(h * maxSize / w); w = maxSize; }
          else if(h >= w && h > maxSize){ w = Math.round(w * maxSize / h); h = maxSize; }
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function extractOutputText(data){
    if(data && typeof data.output_text === "string" && data.output_text.trim()) return data.output_text.trim();

    let parts = [];
    if(data && Array.isArray(data.output)){
      data.output.forEach(out => {
        if(Array.isArray(out.content)){
          out.content.forEach(c => {
            if(typeof c.text === "string") parts.push(c.text);
            if(typeof c.output_text === "string") parts.push(c.output_text);
            if(c.type === "output_text" && typeof c.text === "string") parts.push(c.text);
          });
        }
      });
    }
    return parts.join("\n").trim();
  }

  function parseJSONSafe(text){
    text = String(text || "").trim()
      .replace(/^```json\s*/i, "")
      .replace(/^```\s*/i, "")
      .replace(/```$/i, "")
      .trim();

    if(!text) throw new Error("A IA respondeu vazio.");

    try { return JSON.parse(text); } catch(e) {}

    const first = text.indexOf("{");
    const last = text.lastIndexOf("}");
    if(first >= 0 && last > first){
      try { return JSON.parse(text.slice(first, last + 1)); } catch(e) {}
    }

    throw new Error("A IA respondeu fora de JSON: " + text.slice(0,220));
  }

  async function openai(content){
    const apiKey = getKey();
    if(!apiKey) throw new Error("Cole a chave OpenAI e clique em Salvar chave.");

    let resp;
    try{
      resp = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "gpt-4.1-mini",
          input: [{ role: "user", content }]
        })
      });
    }catch(e){
      throw new Error("Falha ao conectar com OpenAI. Confira internet/chave. Detalhe: " + (e.message || e));
    }

    const raw = await resp.text();
    let data;
    try{
      data = JSON.parse(raw);
    }catch(e){
      // Aqui é onde antes aparecia Unexpected token '<'. Agora mostramos o motivo real.
      throw new Error("A resposta não veio em JSON. Começo da resposta: " + raw.slice(0,180));
    }

    if(!resp.ok){
      const msg = data.error && data.error.message ? data.error.message : raw.slice(0,240);
      throw new Error(msg);
    }

    return parseJSONSafe(extractOutputText(data));
  }

  function saveMeal(values, name){
    if(typeof db === "undefined"){
      alert("Banco de dados do site ainda não carregou.");
      return false;
    }

    // Formato original do site
    if(typeof foodToday === "function" && typeof change === "function"){
      change(() => foodToday().items.push({
        id: typeof uid === "function" ? uid() : ("ia_" + Date.now().toString(36)),
        name: name || "Refeição por IA",
        qtd: 1,
        unit: "IA",
        p: n(values.proteina),
        c: n(values.carboidrato),
        g: n(values.gordura),
        k: Math.round(n(values.calorias))
      }));
      return true;
    }

    // Fallback para db.meals
    const d = todayIA();
    db.meals = db.meals || {};
    db.meals[d] = db.meals[d] || {items:[], water:0, check:{}};
    db.meals[d].items = Array.isArray(db.meals[d].items) ? db.meals[d].items : [];
    db.meals[d].items.push({
      id:"ia_" + Date.now().toString(36),
      name:name || "Refeição por IA",
      unit:"IA",
      qtd:1,
      p:n(values.proteina),
      c:n(values.carboidrato),
      g:n(values.gordura),
      f:n(values.fibra),
      k:Math.round(n(values.calorias))
    });

    db.lastSaved = new Date().toLocaleString("pt-BR");
    db.updatedAtMs = Date.now();
    try{ if(typeof KEY !== "undefined") localStorage.setItem(KEY, JSON.stringify(db)); }catch(e){}
    try{ if(typeof save === "function") save(false); }catch(e){}
    try{ if(typeof renderFood === "function") renderFood(); }catch(e){}
    try{ if(typeof renderHome === "function") renderHome(); }catch(e){}
    return true;
  }

  function showResult(data, defaultName){
    const target = document.getElementById("iaDiretaResult");
    const totals = data.totais || data || {};
    const name = data.nome || data.descricao || defaultName || "Refeição por IA";
    const itens = Array.isArray(data.itens) ? data.itens : [];

    target.innerHTML = `
      <div class="card">
        <h4>Resultado da IA</h4>
        <p><strong>Nome:</strong> ${escapeHtml(name)}</p>
        ${data.confianca ? `<p><strong>Confiança:</strong> ${escapeHtml(data.confianca)}</p>` : ""}
        <div class="ia-grid">
          <div><label>Proteína</label><input id="iaDirP" type="number" step="0.1" value="${n(totals.proteina).toFixed(1)}"></div>
          <div><label>Carbo</label><input id="iaDirC" type="number" step="0.1" value="${n(totals.carboidrato).toFixed(1)}"></div>
          <div><label>Gordura</label><input id="iaDirG" type="number" step="0.1" value="${n(totals.gordura).toFixed(1)}"></div>
          <div><label>Fibra</label><input id="iaDirF" type="number" step="0.1" value="${n(totals.fibra).toFixed(1)}"></div>
          <div><label>Calorias</label><input id="iaDirK" type="number" step="1" value="${Math.round(n(totals.calorias))}"></div>
        </div>
        ${itens.length ? `<p><strong>Itens:</strong> ${escapeHtml(itens.map(i => `${i.nome || "alimento"} (${i.quantidade || "estimado"})`).join(", "))}</p>` : ""}
        <p class="muted">${escapeHtml(data.observacao || "Estimativa por IA. Ajuste se precisar.")}</p>
        <button type="button" class="primary" id="iaDiretaConfirm">Confirmar e adicionar</button>
      </div>
    `;

    document.getElementById("iaDiretaConfirm").onclick = function(){
      const ok = saveMeal({
        proteina: n(document.getElementById("iaDirP").value),
        carboidrato: n(document.getElementById("iaDirC").value),
        gordura: n(document.getElementById("iaDirG").value),
        fibra: n(document.getElementById("iaDirF").value),
        calorias: n(document.getElementById("iaDirK").value)
      }, name);

      if(ok) alert("Adicionado na alimentação.");
    };
  }

  async function analyzeText(){
    const result = document.getElementById("iaDiretaResult");
    const txt = document.getElementById("iaDiretaText").value.trim();
    if(!txt){ alert("Digite a refeição."); return; }

    result.innerHTML = "<p>Calculando refeição com IA...</p>";

    const prompt = `
Analise esta refeição: "${txt}".
Responda SOMENTE JSON válido, sem markdown.
Formato:
{
 "nome":"nome curto",
 "proteina":0,
 "carboidrato":0,
 "gordura":0,
 "fibra":0,
 "calorias":0,
 "observacao":"estimativa"
}
Use números em gramas e kcal.
`;

    const data = await openai([{ type:"input_text", text:prompt }]);
    showResult(data, txt);
  }

  async function analyzePhoto(){
    const result = document.getElementById("iaDiretaResult");
    const file = document.getElementById("iaDiretaFile").files[0];
    if(!file){ alert("Escolha ou tire uma foto."); return; }

    result.innerHTML = "<p>Analisando foto com IA...</p>";

    const imageBase64 = await compress(file, 850, 0.70);

    const prompt = `
Analise a foto do prato/refeição.
Responda SOMENTE JSON válido, sem markdown.
Formato:
{
 "descricao":"resumo curto",
 "itens":[{"nome":"alimento","quantidade":"estimativa","proteina":0,"carboidrato":0,"gordura":0,"fibra":0,"calorias":0}],
 "totais":{"proteina":0,"carboidrato":0,"gordura":0,"fibra":0,"calorias":0},
 "confianca":"baixa|media|alta",
 "observacao":"Estimativa por imagem. Ajuste se precisar."
}
Use números em gramas e kcal.
`;

    const data = await openai([
      { type:"input_text", text:prompt },
      { type:"input_image", image_url:imageBase64 }
    ]);
    showResult(data, data.descricao || "Prato por IA");
  }

  function mount(){
    const sec = foodSection();
    if(!sec) return;

    removeOldIABoxes();

    if(document.getElementById("iaDiretaFinalBox")) return;

    const box = document.createElement("div");
    box.id = "iaDiretaFinalBox";
    box.className = "card";
    box.innerHTML = `
      <h2>🤖 IA da alimentação</h2>
      <p class="small">Versão direta: não usa Netlify Functions. Cole a chave uma vez neste aparelho.</p>

      <div class="ia-key-row">
        <div>
          <label>Chave OpenAI</label>
          <input id="iaDiretaKey" type="password" placeholder="Cole sua OPENAI_API_KEY" value="${escapeHtml(getKey())}">
        </div>
        <button type="button" id="iaDiretaSaveKey">Salvar chave</button>
      </div>

      <hr>

      <h3>🍽️ Refeição por texto</h3>
      <textarea id="iaDiretaText" rows="2" placeholder="Ex: 200g arroz, 150g frango e 1 concha de feijão"></textarea>
      <br>
      <button type="button" class="primary" id="iaDiretaTextBtn">Calcular refeição com IA</button>

      <hr>

      <h3>📸 Prato por foto</h3>
      <input id="iaDiretaFile" type="file" accept="image/*" capture="environment">
      <img id="iaDiretaPreview">
      <br>
      <button type="button" class="primary" id="iaDiretaPhotoBtn">Analisar foto com IA</button>

      <div id="iaDiretaResult" style="margin-top:12px"></div>
    `;

    sec.appendChild(box);

    document.getElementById("iaDiretaSaveKey").onclick = function(){
      saveKey(document.getElementById("iaDiretaKey").value);
      alert("Chave salva neste aparelho.");
    };

    document.getElementById("iaDiretaTextBtn").onclick = async function(){
      try{
        saveKey(document.getElementById("iaDiretaKey").value);
        await analyzeText();
      }catch(e){
        document.getElementById("iaDiretaResult").innerHTML = `<p><b>Erro:</b> ${escapeHtml(e.message || e)}</p>`;
      }
    };

    document.getElementById("iaDiretaPhotoBtn").onclick = async function(){
      try{
        saveKey(document.getElementById("iaDiretaKey").value);
        await analyzePhoto();
      }catch(e){
        document.getElementById("iaDiretaResult").innerHTML = `<p><b>Erro:</b> ${escapeHtml(e.message || e)}</p>`;
      }
    };

    document.getElementById("iaDiretaFile").onchange = async function(){
      const f = this.files && this.files[0];
      if(!f) return;
      const img = await compress(f, 850, 0.72);
      const preview = document.getElementById("iaDiretaPreview");
      preview.src = img;
      preview.style.display = "block";
    };
  }

  // Neutraliza as funções antigas que chamavam Netlify.
  window.estimateFoodByText = function(){
    mount();
    const txt = document.getElementById("aiFoodText")?.value || document.getElementById("foodName")?.value || "";
    const boxText = document.getElementById("iaDiretaText");
    if(boxText && txt) boxText.value = txt;
    const btn = document.getElementById("iaDiretaTextBtn");
    if(btn) btn.click();
  };

  // Reaplica após renderizações do app, porque o app reconstrói a aba Alimentação.
  const originalRenderFood = window.renderFood;
  if(typeof originalRenderFood === "function"){
    window.renderFood = function(){
      const r = originalRenderFood.apply(this, arguments);
      setTimeout(mount, 80);
      return r;
    };
  }

  const originalRenderAll = window.renderAll;
  if(typeof originalRenderAll === "function"){
    window.renderAll = function(){
      const r = originalRenderAll.apply(this, arguments);
      setTimeout(mount, 120);
      return r;
    };
  }

  document.addEventListener("click", function(){
    setTimeout(mount, 250);
  }, false);

  setTimeout(mount, 1000);
})();
</script>


<script id="habit-ai-gallery-patch-js">
(function(){
  if(window.__habitAiGalleryPatchFinal) return;
  window.__habitAiGalleryPatchFinal = true;

  const AI_STORAGE_KEY = 'openai_api_key_daniel_health_os';
  const HABITS = [
    {key:'sexo', label:'Sexo'},
    {key:'vaper', label:'Fumei vaper'},
    {key:'maconha', label:'Fumei maconha'},
    {key:'masturbei', label:'Masturbei'}
  ];

  function ensurePatchState(){
    try{
      db.ai ||= {};
      db.control ||= {goals:{sexo:40,vaper:40,maconha:40,masturbei:40}, startDates:{sexo:today(),vaper:today(),maconha:today(),masturbei:today()}, logs:{}};
      db.control.goals ||= {sexo:40,vaper:40,maconha:40,masturbei:40};
      db.control.startDates ||= {sexo:today(),vaper:today(),maconha:today(),masturbei:today()};
      db.control.logs ||= {};
      HABITS.forEach(h=>{
        if(db.control.goals[h.key]===undefined) db.control.goals[h.key]=40;
        if(!db.control.startDates[h.key]) db.control.startDates[h.key]=today();
      });
      const stored = localStorage.getItem(AI_STORAGE_KEY)||'';
      if(!db.ai.openaiKey && stored){ db.ai.openaiKey = stored; }
      if(db.ai.openaiKey && !stored){ localStorage.setItem(AI_STORAGE_KEY, db.ai.openaiKey); }
    }catch(e){ console.warn('ensurePatchState', e); }
  }
  ensurePatchState();

  function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
  function n(v){ const x=parseFloat(String(v??'').replace(',','.')); return Number.isFinite(x)?x:0; }
  function getAIKey(){ ensurePatchState(); return (db.ai&&db.ai.openaiKey) || localStorage.getItem(AI_STORAGE_KEY) || ''; }
  function setAIKey(v){
    const key=(v||'').trim();
    if(!key){ alert('Digite a chave OpenAI.'); return; }
    try{ localStorage.setItem(AI_STORAGE_KEY, key); }catch(e){}
    pushUndo();
    db.ai ||= {};
    db.ai.openaiKey = key;
    save(false);
    renderAll();
    alert('Chave OpenAI salva e sincronizada.');
  }
  function parseJsonLoose(text){
    text=String(text||'').trim().replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```$/,'').trim();
    try{ return JSON.parse(text); }catch(e){}
    const a=text.indexOf('{'), b=text.lastIndexOf('}');
    if(a>=0 && b>a){ return JSON.parse(text.slice(a,b+1)); }
    throw new Error('A IA não retornou JSON válido.');
  }
  function extractOutputText(data){
    if(data && typeof data.output_text==='string' && data.output_text.trim()) return data.output_text.trim();
    let parts=[];
    (data.output||[]).forEach(out=>{
      (out.content||[]).forEach(c=>{
        if(typeof c.text==='string') parts.push(c.text);
        if(typeof c.output_text==='string') parts.push(c.output_text);
      });
    });
    return parts.join('\n').trim();
  }
  async function callOpenAI(content){
    const apiKey = getAIKey();
    if(!apiKey) throw new Error('Chave OpenAI não configurada. Vá na aba Backup e salve a chave uma vez.');
    let resp;
    try{
      resp = await fetch('https://api.openai.com/v1/responses', {
        method:'POST',
        headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},
        body: JSON.stringify({ model:'gpt-4.1-mini', input:[{role:'user', content}] })
      });
    }catch(e){ throw new Error('Falha ao conectar com a OpenAI: '+(e.message||e)); }
    const raw = await resp.text();
    let data;
    try{ data = JSON.parse(raw); }catch(e){ throw new Error('Resposta inválida da IA: '+raw.slice(0,160)); }
    if(!resp.ok){ throw new Error(data?.error?.message || 'Erro ao consultar IA'); }
    return parseJsonLoose(extractOutputText(data));
  }
  function fileToBase64Resized(file,maxSize=850,quality=.72){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.width,h=img.height;
          if(w>h && w>maxSize){ h=Math.round(h*maxSize/w); w=maxSize; }
          else if(h>=w && h>maxSize){ w=Math.round(w*maxSize/h); h=maxSize; }
          const c=document.createElement('canvas'); c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          resolve(c.toDataURL('image/jpeg',quality));
        };
        img.onerror=reject;
        img.src=e.target.result;
      };
      reader.onerror=reject;
      reader.readAsDataURL(file);
    });
  }
  function addMealToFood(item){
    change(()=>foodToday().items.push({
      id:uid(),
      name:item.name||'Refeição IA',
      qtd:item.qtd||1,
      unit:item.unit||'estimado',
      p:+n(item.p).toFixed(1),
      c:+n(item.c).toFixed(1),
      g:+n(item.g).toFixed(1),
      k:+n(item.k).toFixed(0)
    }));
  }

  window.__pendingFoodAI = null;
  window.estimateFoodByText = async function(){
    const box=document.getElementById('aiFoodTextResult');
    const text=val('aiFoodText');
    if(!text){ alert('Digite o alimento ou refeição.'); return; }
    if(box) box.innerHTML='<span class="pill">IA analisando refeição...</span>';
    try{
      const data = await callOpenAI([{type:'input_text',text:`Analise esta refeição: "${text}". Responda SOMENTE JSON válido, sem markdown, no formato {"nome":"","quantidade":1,"unidade":"porção","proteina":0,"carboidrato":0,"gordura":0,"calorias":0,"observacao":""}. Use gramas e kcal.`}]);
      const item={ name:data.nome||text, qtd:n(data.quantidade)||1, unit:data.unidade||'estimado', p:n(data.proteina), c:n(data.carboidrato), g:n(data.gordura), k:n(data.calorias) };
      window.__pendingFoodAI=item;
      if(box) box.innerHTML=`<div class="ia-result-card"><b>${esc(item.name)}</b><br><span class="pill">Qtd: ${item.qtd} ${esc(item.unit)}</span><span class="pill">Proteína: ${item.p.toFixed(1)}g</span><span class="pill">Carbo: ${item.c.toFixed(1)}g</span><span class="pill">Gordura: ${item.g.toFixed(1)}g</span><span class="pill">Kcal: ${Math.round(item.k)}</span><p class="small">${esc(data.observacao||'Estimativa feita por IA. Confira antes de aceitar.')}</p><button class="primary" onclick="acceptAITextFood()">Aceitar e somar nos gráficos</button><button onclick="editAITextFood()">Editar manualmente</button></div>`;
    }catch(e){ if(box) box.innerHTML='<b>Erro:</b> '+esc(e.message||e)+'<p class="small">Salve a chave uma vez na aba Backup.</p>'; }
  };
  window.acceptAITextFood = function(){
    if(!window.__pendingFoodAI){ alert('Analise uma refeição primeiro.'); return; }
    addMealToFood(window.__pendingFoodAI);
    window.__pendingFoodAI = null;
  };
  window.editAITextFood = function(){
    const i=window.__pendingFoodAI; if(!i) return;
    const ids={name:'manualMealName',p:'manualMealP',c:'manualMealC',g:'manualMealG',k:'manualMealK'};
    if(document.getElementById(ids.name)) document.getElementById(ids.name).value=i.name||'';
    if(document.getElementById(ids.p)) document.getElementById(ids.p).value=i.p||0;
    if(document.getElementById(ids.c)) document.getElementById(ids.c).value=i.c||0;
    if(document.getElementById(ids.g)) document.getElementById(ids.g).value=i.g||0;
    if(document.getElementById(ids.k)) document.getElementById(ids.k).value=Math.round(i.k||0);
    document.getElementById(ids.name)?.scrollIntoView({behavior:'smooth',block:'center'});
  };

  window.previewFoodPhotoAI = async function(inputId){
    const input=document.getElementById(inputId); const file=input?.files?.[0];
    if(!file) return;
    const img=document.getElementById('foodPhotoPreview');
    img.src = await fileToBase64Resized(file,850,.74);
    img.style.display='block';
    const otherId = inputId==='foodPhotoCamera' ? 'foodPhotoGallery' : 'foodPhotoCamera';
    const other=document.getElementById(otherId); if(other) other.value='';
  };
  window.analyzeFoodPhotoAI = async function(){
    const file=document.getElementById('foodPhotoCamera')?.files?.[0] || document.getElementById('foodPhotoGallery')?.files?.[0];
    const out=document.getElementById('foodPhotoAIResult');
    if(!file){ alert('Escolha uma foto da câmera ou da galeria.'); return; }
    if(out) out.innerHTML='<span class="pill">IA analisando foto...</span>';
    try{
      const imageData = await fileToBase64Resized(file,850,.72);
      const data = await callOpenAI([
        {type:'input_text', text:'Analise a foto do prato/refeição. Responda SOMENTE JSON válido, sem markdown, no formato {"descricao":"","totais":{"proteina":0,"carboidrato":0,"gordura":0,"fibra":0,"calorias":0},"observacao":""}. Use gramas e kcal.'},
        {type:'input_image', image_url:imageData}
      ]);
      const t=data.totais||data;
      window.__pendingPhotoFoodAI = { name:data.descricao||'Prato por IA', qtd:1, unit:'estimado', p:n(t.proteina), c:n(t.carboidrato), g:n(t.gordura), k:n(t.calorias) };
      if(out) out.innerHTML=`<div class="ia-result-card"><b>${esc(window.__pendingPhotoFoodAI.name)}</b><br><span class="pill">Proteína: ${window.__pendingPhotoFoodAI.p.toFixed(1)}g</span><span class="pill">Carbo: ${window.__pendingPhotoFoodAI.c.toFixed(1)}g</span><span class="pill">Gordura: ${window.__pendingPhotoFoodAI.g.toFixed(1)}g</span><span class="pill">Kcal: ${Math.round(window.__pendingPhotoFoodAI.k)}</span><p class="small">${esc(data.observacao||'Estimativa por imagem. Confira antes de aceitar.')}</p><button class="primary" onclick="acceptFoodPhotoAI()">Aceitar e somar nos gráficos</button></div>`;
    }catch(e){ if(out) out.innerHTML='<b>Erro:</b> '+esc(e.message||e)+'<p class="small">Se a chave ainda não foi salva, faça isso na aba Backup.</p>'; }
  };
  window.acceptFoodPhotoAI = function(){
    if(!window.__pendingPhotoFoodAI){ alert('Analise a foto primeiro.'); return; }
    addMealToFood(window.__pendingPhotoFoodAI);
    window.__pendingPhotoFoodAI = null;
  };
  function injectFoodPhotoCard(){
    const sec=document.getElementById('alimentacao');
    if(!sec) return;
    document.getElementById('iaDiretaFinalBox')?.remove();
    const badCards=[...sec.querySelectorAll('.card')].filter(c=>/IA da alimentação|Chave OpenAI/i.test(c.textContent||''));
    badCards.forEach(c=>{ if(c.id!=='foodPhotoAICard') c.remove(); });
    if(document.getElementById('foodPhotoAICard')) return;
    const cards=sec.querySelectorAll('.card');
    const card=document.createElement('div');
    card.className='card'; card.id='foodPhotoAICard';
    card.innerHTML=`<h2>Foto do prato com IA</h2><p class="small">Use câmera ou galeria. O sistema estima os macros e você confirma antes de somar nos gráficos.</p><div class="ia-food-grid"><div><label>Tirar foto agora</label><input id="foodPhotoCamera" type="file" accept="image/*" capture="environment" onchange="previewFoodPhotoAI('foodPhotoCamera')"></div><div><label>Escolher da galeria</label><input id="foodPhotoGallery" type="file" accept="image/*" onchange="previewFoodPhotoAI('foodPhotoGallery')"></div></div><img id="foodPhotoPreview" style="display:none"><br><button class="primary" onclick="analyzeFoodPhotoAI()">Analisar foto com IA</button><div id="foodPhotoAIResult" style="margin-top:12px"></div>`;
    if(cards[1]) cards[1].insertAdjacentElement('afterend', card); else sec.appendChild(card);
  }

  const originalRenderFood = window.renderFood;
  window.renderFood = function(){
    const r = originalRenderFood.apply(this, arguments);
    setTimeout(injectFoodPhotoCard, 60);
    return r;
  };

  window.saveAIKeyGlobal = function(){ setAIKey(val('aiGlobalKey')); };
  const originalRenderBackup = window.renderBackup;
  window.renderBackup = function(){
    if(typeof originalRenderBackup==='function') originalRenderBackup();
    const sec=document.getElementById('backup');
    if(!sec || document.getElementById('aiKeySyncCard')) return;
    const card=document.createElement('div');
    card.className='card'; card.id='aiKeySyncCard';
    card.innerHTML=`<h2>IA da alimentação</h2><p class="small">Salve sua chave OpenAI uma vez aqui. Ela fica guardada e sincronizada com o sistema, sem precisar pedir na tela da alimentação.</p><label>Chave OpenAI</label><input id="aiGlobalKey" type="password" placeholder="Cole sua OPENAI_API_KEY" value="${esc(getAIKey())}"><br><br><button class="primary" onclick="saveAIKeyGlobal()">Salvar chave da IA</button>`;
    sec.appendChild(card);
  };

  function dayPlus(dateStr,plus){ const d=parseLocalDateSP(dateStr||today()); d.setDate(d.getDate()+plus); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function daysDiff(start,end){ const a=parseLocalDateSP(start), b=parseLocalDateSP(end); return Math.round((b-a)/(1000*60*60*24)); }
  function monthKey(){ return today().slice(0,7); }
  function controlLastUsedDate(key){ return Object.keys(db.control.logs||{}).filter(d=>db.control.logs[d] && db.control.logs[d][key]).sort().at(-1)||''; }
  function controlCurrentStreak(key){
    const start=db.control.startDates[key]||today();
    const last=controlLastUsedDate(key);
    if(last===today()) return 0;
    const base=last ? dayPlus(last,1) : start;
    return Math.max(1, daysDiff(base, today())+1);
  }
  function controlBestStreak(key){
    const start=db.control.startDates[key]||today();
    const usedDates=Object.keys(db.control.logs||{}).filter(d=>db.control.logs[d] && db.control.logs[d][key]).sort();
    let best=0, marker=start;
    if(!usedDates.length) return Math.max(1, daysDiff(start,today())+1);
    usedDates.forEach(d=>{
      const gap = Math.max(0, daysDiff(marker,d));
      if(gap>best) best=gap;
      marker = dayPlus(d,1);
    });
    const currentGap = Math.max(0, daysDiff(marker,today())+1);
    return Math.max(best,currentGap);
  }
  function controlMonthlyCount(key,month){ return Object.keys(db.control.logs||{}).filter(d=>String(d).startsWith(month) && db.control.logs[d] && db.control.logs[d][key]).length; }
  function controlProgress(key){ const cur=controlCurrentStreak(key), goal=n(db.control.goals[key])||0; return goal>0 ? Math.min(100, Math.round(cur/goal*100)) : 0; }
  window.saveControlGoals = function(){
    change(()=>{
      db.control ||= {goals:{},startDates:{},logs:{}};
      HABITS.forEach(h=>{
        db.control.goals[h.key] = n(document.getElementById('goal_'+h.key)?.value) || 0;
        if(!db.control.startDates[h.key]) db.control.startDates[h.key] = today();
      });
    });
  };
  window.saveControlDay = function(){
    const d=val('controlDate')||today();
    change(()=>{
      db.control.logs[d] = {
        sexo: !!document.getElementById('did_sexo')?.checked,
        vaper: !!document.getElementById('did_vaper')?.checked,
        maconha: !!document.getElementById('did_maconha')?.checked,
        masturbei: !!document.getElementById('did_masturbei')?.checked,
        obs: val('controlObs')
      };
      HABITS.forEach(h=>{ if(!db.control.startDates[h.key]) db.control.startDates[h.key]=d; });
    });
  };
  window.loadControlDay = function(dateStr){
    const d=dateStr||val('controlDate')||today();
    const item=(db.control.logs||{})[d]||{};
    ['sexo','vaper','maconha','masturbei'].forEach(k=>{ const el=document.getElementById('did_'+k); if(el) el.checked=!!item[k]; });
    const obs=document.getElementById('controlObs'); if(obs) obs.value=item.obs||'';
  };
  window.deleteControlLog = function(dateStr){ if(!confirm('Excluir este registro?')) return; change(()=>{ delete db.control.logs[dateStr]; }); };
  window.renderControle = function(){
    ensurePatchState();
    const sec=document.getElementById('controle'); if(!sec) return;
    const m=monthKey();
    const rows=Object.keys(db.control.logs||{}).sort((a,b)=>b.localeCompare(a)).map(d=>({date:d,...db.control.logs[d]}));
    sec.innerHTML = `<div id="controlPanel"><div class="card"><h2>Controle de hábitos</h2><p class="small">Marque se fez no dia. O sistema mostra a sequência de dias sem usar/fazer e compara com a meta que você definir.</p><div class="control-grid">${HABITS.map(h=>`<div><label>Meta para ficar sem ${h.label.toLowerCase()} (dias)</label><input id="goal_${h.key}" type="number" min="0" value="${n(db.control.goals[h.key])||0}"></div>`).join('')}</div><button class="primary" onclick="saveControlGoals()">Salvar metas</button></div><div class="card"><h2>Registrar o dia</h2><div class="control-grid"><div><label>Data</label><input id="controlDate" type="date" value="${today()}" onchange="loadControlDay(this.value)"></div><div><label><input id="did_sexo" type="checkbox"> Fiz sexo</label></div><div><label><input id="did_vaper" type="checkbox"> Fumei vaper</label></div><div><label><input id="did_maconha" type="checkbox"> Fumei maconha</label></div><div><label><input id="did_masturbei" type="checkbox"> Masturbei</label></div></div><label>Observação</label><textarea id="controlObs" placeholder="Se quiser, escreva algo do dia."></textarea><br><button class="primary" onclick="saveControlDay()">Salvar registro do dia</button></div><div class="card"><h2>Progresso das metas</h2><div class="habit-cards">${HABITS.map(h=>{ const cur=controlCurrentStreak(h.key), goal=n(db.control.goals[h.key])||0, best=controlBestStreak(h.key), pct=controlProgress(h.key), left=Math.max(0, goal-cur); return `<div class="habit-card"><h3>${h.label}</h3><p><b>Atual sem usar/fazer:</b> ${cur} dia(s)</p><p><b>Meta:</b> ${goal} dia(s)</p><p><b>Faltam:</b> ${left} dia(s)</p><p><b>Melhor sequência:</b> ${best} dia(s)</p><div class="goalbar"><div style="width:${pct}%"></div></div><p class="small">${pct}% da meta concluída</p></div>`; }).join('')}</div></div><div class="card"><h2>Relatório do mês atual</h2><table class="control-table"><tr><th>Item</th><th>Meta (dias)</th><th>Sequência atual</th><th>Melhor</th><th>Usou/fez no mês</th></tr>${HABITS.map(h=>`<tr><td>${h.label}</td><td>${n(db.control.goals[h.key])||0}</td><td>${controlCurrentStreak(h.key)}</td><td>${controlBestStreak(h.key)}</td><td>${controlMonthlyCount(h.key,m)} vez(es)</td></tr>`).join('')}</table></div><div class="card"><h2>Histórico</h2><table class="control-table"><tr><th>Data</th><th>Sexo</th><th>Vaper</th><th>Maconha</th><th>Masturbei</th><th>Obs</th><th></th></tr>${rows.length?rows.map(r=>`<tr><td>${brDate(r.date)}</td><td>${r.sexo?'Sim':'Não'}</td><td>${r.vaper?'Sim':'Não'}</td><td>${r.maconha?'Sim':'Não'}</td><td>${r.masturbei?'Sim':'Não'}</td><td>${esc(r.obs||'')}</td><td><button class="mini danger" onclick="deleteControlLog('${r.date}')">X</button></td></tr>`).join(''):'<tr><td colspan="7">Nenhum registro ainda.</td></tr>'}</table></div></div>`;
    setTimeout(()=>window.loadControlDay(today()),30);
  };

  const originalRenderReports = window.renderReports;
  window.renderReports = function(){
    if(typeof originalRenderReports==='function') originalRenderReports();
    const sec=document.getElementById('relatorios'); if(!sec || document.getElementById('controlReportExtra')) return;
    const m=monthKey();
    const card=document.createElement('div'); card.className='card'; card.id='controlReportExtra';
    card.innerHTML=`<h2>Resumo do controle de hábitos</h2><table><tr><th>Item</th><th>Usou/fez no mês</th><th>Sequência atual</th><th>Meta</th></tr>${HABITS.map(h=>`<tr><td>${h.label}</td><td>${controlMonthlyCount(h.key,m)} vez(es)</td><td>${controlCurrentStreak(h.key)} dia(s)</td><td>${n(db.control.goals[h.key])||0} dia(s)</td></tr>`).join('')}</table>`;
    sec.appendChild(card);
  };

  const originalRenderAll = window.renderAll;
  window.renderAll = function(){
    const r = originalRenderAll.apply(this, arguments);
    try{ window.renderControle(); }catch(e){ console.warn(e); }
    setTimeout(()=>{ try{ injectFoodPhotoCard(); }catch(e){} try{ window.renderBackup(); }catch(e){} }, 80);
    return r;
  };

  setTimeout(()=>{
    try{ ensurePatchState(); renderTabs(); renderAll(); }catch(e){ console.warn('patch rerender',e); }
  }, 300);
})();
</script>


<script id="api-key-visible-final-js">
(function(){
  if(window.__apiKeyVisibleFinalOK) return;
  window.__apiKeyVisibleFinalOK = true;

  const API_KEY_STORE = "openai_api_key_daniel_health_os";

  function safe(s){
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function getKey(){
    try{
      if(typeof db !== "undefined"){
        db.ai ||= {};
        const fromDb = db.ai.openaiKey || "";
        const fromLocal = localStorage.getItem(API_KEY_STORE) || "";
        if(fromDb && !fromLocal) localStorage.setItem(API_KEY_STORE, fromDb);
        if(fromLocal && !fromDb) db.ai.openaiKey = fromLocal;
        return db.ai.openaiKey || fromLocal || "";
      }
    }catch(e){}
    try{return localStorage.getItem(API_KEY_STORE) || "";}catch(e){return "";}
  }

  window.saveOpenAIKeyHealthOS = function(inputId){
    const el = document.getElementById(inputId || "openAiKeyVisible");
    const key = (el && el.value ? el.value : "").trim();

    if(!key){
      alert("Cole a chave API primeiro.");
      return;
    }

    if(!key.startsWith("sk-")){
      if(!confirm("Essa chave não parece começar com sk-. Quer salvar mesmo assim?")) return;
    }

    try{
      localStorage.setItem(API_KEY_STORE, key);
      if(typeof db !== "undefined"){
        db.ai ||= {};
        db.ai.openaiKey = key;
        if(typeof save === "function") save(false);
        else localStorage.setItem(typeof KEY !== "undefined" ? KEY : "saude_daniel_v2", JSON.stringify(db));
      }
    }catch(e){
      alert("Erro ao salvar chave: " + (e.message || e));
      return;
    }

    alert("Chave da IA salva com sucesso.");
    try{ renderAll(); }catch(e){}
  };

  window.removeOpenAIKeyHealthOS = function(){
    if(!confirm("Apagar a chave da IA salva neste site?")) return;
    try{
      localStorage.removeItem(API_KEY_STORE);
      if(typeof db !== "undefined"){
        db.ai ||= {};
        db.ai.openaiKey = "";
        if(typeof save === "function") save(false);
      }
    }catch(e){}
    alert("Chave apagada.");
    try{ renderAll(); }catch(e){}
  };

  window.renderIASettings = function(){
    const sec = document.getElementById("ia");
    if(!sec) return;

    const key = getKey();
    sec.innerHTML = `
      <div id="iaSettingsPanel">
        <div class="card api-key-box">
          <h2>Configurar IA</h2>
          <p class="small">Cole aqui sua chave da OpenAI. Depois de salvar, a aba Alimentação usa a IA automaticamente para texto, câmera e galeria.</p>

          <div class="api-key-row">
            <div>
              <label>Chave API da OpenAI</label>
              <input id="openAiKeyVisible" type="password" placeholder="Cole aqui sua chave, começa com sk-..." value="${safe(key)}">
            </div>
            <button class="primary" onclick="saveOpenAIKeyHealthOS('openAiKeyVisible')">Salvar chave da IA</button>
          </div>

          <div class="api-status">
            ${key ? '<span class="pill ok">Chave salva ✅</span>' : '<span class="pill warn">Chave ainda não salva</span>'}
          </div>

          <p class="small">Depois de salvar, volte em <b>Alimentação</b> e use a IA normalmente.</p>
          ${key ? '<button class="danger mini" onclick="removeOpenAIKeyHealthOS()">Apagar chave salva</button>' : ''}
        </div>

        <div class="card">
          <h2>Como usar</h2>
          <p>1. Crie a chave no site da OpenAI.</p>
          <p>2. Cole no campo acima.</p>
          <p>3. Clique em <b>Salvar chave da IA</b>.</p>
          <p>4. Vá em <b>Alimentação</b> e use foto da galeria, câmera ou texto.</p>
        </div>
      </div>
    `;
  };

  function injectFoodKeyCard(){
    const sec = document.getElementById("alimentacao");
    if(!sec) return;

    const old = document.getElementById("aiKeyTopFoodCard");
    if(old) old.remove();

    const key = getKey();
    const card = document.createElement("div");
    card.className = "card";
    card.id = "aiKeyTopFoodCard";
    card.innerHTML = `
      <h2>Chave da IA</h2>
      <p class="small">Salve a chave aqui uma vez. Depois a IA usa automaticamente.</p>
      <div class="api-key-row">
        <div>
          <label>Chave API da OpenAI</label>
          <input id="openAiKeyFoodTop" type="password" placeholder="Cole aqui sua chave, começa com sk-..." value="${safe(key)}">
        </div>
        <button class="primary" onclick="saveOpenAIKeyHealthOS('openAiKeyFoodTop')">Salvar chave da IA</button>
      </div>
      <div class="api-status">
        ${key ? '<span class="pill ok">Chave salva ✅</span>' : '<span class="pill warn">Cole a chave para a IA funcionar</span>'}
      </div>
    `;

    sec.insertBefore(card, sec.firstChild);
  }

  function injectBackupKeyCard(){
    const sec = document.getElementById("backup");
    if(!sec || document.getElementById("aiKeyBackupVisibleCard")) return;
    const key = getKey();
    const card = document.createElement("div");
    card.className = "card";
    card.id = "aiKeyBackupVisibleCard";
    card.innerHTML = `
      <h2>IA da alimentação</h2>
      <p class="small">Este campo também salva a mesma chave usada na aba Alimentação.</p>
      <div class="api-key-row">
        <div>
          <label>Chave API da OpenAI</label>
          <input id="openAiKeyBackupVisible" type="password" placeholder="Cole aqui sua chave, começa com sk-..." value="${safe(key)}">
        </div>
        <button class="primary" onclick="saveOpenAIKeyHealthOS('openAiKeyBackupVisible')">Salvar chave da IA</button>
      </div>
      ${key ? '<span class="pill ok">Chave salva ✅</span>' : '<span class="pill warn">Chave ainda não salva</span>'}
    `;
    sec.insertBefore(card, sec.firstChild);
  }

  const prevRenderAll = window.renderAll;
  window.renderAll = function(){
    const r = typeof prevRenderAll === "function" ? prevRenderAll.apply(this, arguments) : undefined;
    try{ window.renderIASettings(); }catch(e){}
    setTimeout(function(){
      try{ injectFoodKeyCard(); }catch(e){}
      try{ injectBackupKeyCard(); }catch(e){}
    }, 80);
    return r;
  };

  const prevRenderFood = window.renderFood;
  if(typeof prevRenderFood === "function"){
    window.renderFood = function(){
      const r = prevRenderFood.apply(this, arguments);
      setTimeout(injectFoodKeyCard, 60);
      return r;
    };
  }

  const prevRenderBackup = window.renderBackup;
  if(typeof prevRenderBackup === "function"){
    window.renderBackup = function(){
      const r = prevRenderBackup.apply(this, arguments);
      setTimeout(injectBackupKeyCard, 60);
      return r;
    };
  }

  setTimeout(function(){
    try{ renderTabs(); renderAll(); }catch(e){}
  }, 500);
})();
</script>

</body></html>
